<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IoT Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
</head>
<body class="login-page">
    <section id="login-screen" class="login-screen">
        <div class="login-panel">
            <div class="login-brand">
                <span class="login-chip"><i class="fas fa-microchip"></i> IoT Access</span>
                <h1>Controle de acesso protegido</h1>
                <p>Entre com sua conta para liberar as portas, gerenciar acessos e consultar os registros do sistema.</p>
            </div>

            <form id="login-form" class="login-form">
                <div id="login-message" class="login-message" style="display:none;"></div>
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" class="form-input" placeholder="voce@empresa.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" class="form-input" placeholder="Sua senha" autocomplete="current-password">
                </div>
                <button id="login-submit" type="submit" class="btn-login">
                    <span id="login-submit-text">Entrar</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
