<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT - Controle de Acesso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/reports.css">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="nav-group">
            <div class="nav-logo"><i class="fas fa-microchip"></i></div>
            <div id="nav-doors" class="nav-item active" title="Portas" onclick="switchTab('doors')">
                <i class="fas fa-door-open"></i>
                <span class="nav-label">Portas</span>
            </div>
            <div id="nav-users" class="nav-item admin-only" title="Usuarios" onclick="switchTab('users')">
                <i class="fas fa-users"></i>
                <span class="nav-label">Usuarios</span>
            </div>
            <div id="nav-reports" class="nav-item admin-only" title="Relatorios" onclick="switchTab('reports')">
                <i class="fas fa-chart-bar"></i>
                <span class="nav-label">Relatorios</span>
            </div>
        </div>
        <div class="nav-bottom">
            <div class="nav-item" title="Sair" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span class="nav-label">Sair</span>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <header>
            <div style="display:flex; align-items:center; gap:14px;">
                <button class="btn-panic" id="panic-btn">
                    <i class="fas fa-shield-alt"></i>
                    <span id="panic-text">Modo Seguranca</span>
                </button>
            </div>
            <div class="header-user">
                <div style="text-align:right;">
                    <p class="header-name" id="header-username">Administrador</p>
                    <p class="header-role" id="header-role">Painel de Controle</p>
                </div>
                <i class="fas fa-user-circle" style="font-size:36px;"></i>
            </div>
        </header>

        <div class="view-area">
            <section id="section-doors" class="data-section active">
                <div class="toolbar">
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-bar" placeholder="Pesquisar portas..." oninput="filterCards('doors', this.value)">
                    </div>
                    <button class="btn-new-item admin-only" onclick="openAddDoorModal()">
                        <i class="fas fa-plus-circle"></i> Porta
                    </button>
                </div>
                <div class="cards-grid" id="doors-grid"></div>
            </section>

            <section id="section-users" class="data-section admin-only">
                <div class="toolbar">
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-bar" placeholder="Pesquisar usuarios..." oninput="filterCards('users', this.value)">
                    </div>
                    <button class="btn-new-item admin-only" onclick="openAddUserModal()">
                        <i class="fas fa-plus"></i> Usuario
                    </button>
                </div>
                <div class="cards-grid" id="users-grid"></div>
            </section>

            <section id="section-reports" class="data-section admin-only">
                <div id="reports-container"></div>
            </section>
        </div>
    </div>

    <div id="modal-add-user" class="modal-overlay">
        <div class="modal-content" style="max-width:480px;">
            <span class="close-modal" onclick="closeModal('modal-add-user')">&times;</span>
            <h2 class="modal-title"><i class="fas fa-user-plus"></i> Novo Usuario</h2>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="new-user-name" class="form-input" placeholder="Nome completo">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="new-user-email" class="form-input" placeholder="email@exemplo.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="new-user-password" class="form-input" placeholder="Senha de acesso">
            </div>
            <div class="form-group">
                <label>Tipo de Usuario</label>
                <select id="new-user-type" class="form-input">
                    <option value="0">0 - Usuario Normal</option>
                    <option value="1">1 - Administrador</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeModal('modal-add-user')">Cancelar</button>
                <button class="btn-modal-save primary" onclick="addUser()"><i class="fas fa-check"></i> Cadastrar</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-user" class="modal-overlay">
        <div class="modal-content" style="max-width:620px;">
            <span class="close-modal" onclick="closeModal('modal-edit-user')">&times;</span>
            <h2 class="modal-title"><i class="fas fa-user-edit"></i> Editar Usuario</h2>
            <input type="hidden" id="edit-user-id">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="edit-user-name" class="form-input">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="edit-user-email" class="form-input">
                </div>
                <div class="form-group">
                    <label>Tipo de Usuario</label>
                    <select id="edit-user-type" class="form-input">
                        <option value="0">0 - Usuario Normal</option>
                        <option value="1">1 - Administrador</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="edit-user-status" class="form-input">
                        <option value="active">Ativo</option>
                        <option value="blocked">Bloqueado</option>
                    </select>
                </div>
            </div>
            <div class="section-divider">
                <span>Portas de Acesso Vinculadas</span>
                <button class="btn-add-access-dashed" onclick="openLinkDoorModal()"><i class="fas fa-plus"></i> Vincular Porta</button>
            </div>
            <div class="table-wrapper">
                <table class="data-table" id="user-doors-table">
                    <thead><tr><th>Porta</th><th>Opcao</th></tr></thead>
                    <tbody id="user-doors-tbody"></tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeModal('modal-edit-user')">Cancelar</button>
                <button class="btn-modal-save primary" onclick="saveUser()"><i class="fas fa-save"></i> Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-add-door" class="modal-overlay">
        <div class="modal-content" style="max-width:420px;">
            <span class="close-modal" onclick="closeModal('modal-add-door')">&times;</span>
            <h2 class="modal-title"><i class="fas fa-door-open"></i> Nova Porta</h2>
            <div class="form-group">
                <label>Nome da Porta</label>
                <input type="text" id="new-door-name" class="form-input" placeholder="Ex: Lab 01 - Entrada">
            </div>
            <div class="form-group">
                <label>Status Inicial</label>
                <select id="new-door-status" class="form-input">
                    <option value="closed">Fechada</option>
                    <option value="open">Aberta</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeModal('modal-add-door')">Cancelar</button>
                <button class="btn-modal-save primary" onclick="addDoor()"><i class="fas fa-check"></i> Cadastrar</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-door" class="modal-overlay">
        <div class="modal-content" style="max-width:620px;">
            <span class="close-modal" onclick="closeModal('modal-edit-door')">&times;</span>
            <h2 class="modal-title"><i class="fas fa-cog"></i> Editar Porta</h2>
            <input type="hidden" id="edit-door-id">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                    <label>Nome da Porta</label>
                    <input type="text" id="edit-door-name" class="form-input">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="edit-door-status" class="form-input">
                        <option value="closed">Fechada</option>
                        <option value="open">Aberta</option>
                    </select>
                </div>
            </div>
            <div class="section-divider">
                <span>Usuarios com Acesso</span>
            </div>
            <div class="table-wrapper">
                <table class="data-table" id="door-users-table">
                    <thead><tr><th>Usuario</th><th>Opcoes</th></tr></thead>
                    <tbody id="door-users-tbody"></tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeModal('modal-edit-door')">Cancelar</button>
                <button class="btn-modal-save primary" onclick="saveDoor()"><i class="fas fa-save"></i> Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-link-door" class="modal-overlay">
        <div class="modal-content" style="max-width:400px;">
            <span class="close-modal" onclick="closeModal('modal-link-door')">&times;</span>
            <h2 class="modal-title"><i class="fas fa-link"></i> Vincular Porta</h2>
            <div class="form-group">
                <label>Selecionar Porta</label>
                <select id="link-door-select" class="form-input"></select>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeModal('modal-link-door')">Cancelar</button>
                <button class="btn-modal-save primary" onclick="linkDoorToUser()"><i class="fas fa-link"></i> Vincular</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/env.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/doors.js"></script>
    <script src="js/users.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
